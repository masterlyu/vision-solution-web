  <text x="55" y="210" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e">📝  문서 요약 · 이메일 초안 작성</text>
  <text x="55" y="240" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e">✏️  문구 다듬기 · 번역 보조</text>
  <text x="55" y="270" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e">🌐  Edge 브라우저 사이드바 통합</text>
  <text x="55" y="300" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e">📦  7월 Hugging Face 오픈 웨이트 공개</text>

