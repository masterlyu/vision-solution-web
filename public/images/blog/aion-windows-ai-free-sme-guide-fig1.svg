  <!-- Common footer -->
  <text x="450" y="373" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">두 모델 모두 완전 로컬 처리 — 입력 데이터가 외부로 나가지 않습니다</text>
