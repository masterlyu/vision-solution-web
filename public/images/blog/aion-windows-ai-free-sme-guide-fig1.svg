      <stop offset="0%" style="stop-color:#e8f4fd;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d0eaf9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="plan-bg" x1="0%" y1="0%" x2="0%" y2="100%">
