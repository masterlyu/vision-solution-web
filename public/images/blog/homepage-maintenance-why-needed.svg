<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#134e4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" />
  <circle cx="700" cy="-50" r="200" fill="white" opacity="0.05"/>
  <circle cx="750" cy="450" r="180" fill="white" opacity="0.04"/>
  <!-- Tag badge -->
  <rect x="40" y="40" width="80" height="28" rx="14" fill="white" opacity="0.2"/>
  <text x="80" y="59" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white">유지보수</text>
  <!-- Icon card -->
  <rect x="480" y="60" width="280" height="300" rx="20" fill="white" opacity="0.1" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="620" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="80">🔧</text>
  <text x="620" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">방치하면 생기는</text>
  <text x="620" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.7">문제 3가지</text>
  <!-- Main text -->
  <text x="40" y="130" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" opacity="0.8">그냥 놔두면 안 됩니다</text>
  <text x="40" y="175" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="white">홈페이지 유지보수</text>
  <text x="40" y="215" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="white">왜 필요할까요?</text>
  <text x="40" y="265" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.75">방치 시 발생하는 실제 사례</text>
  <rect x="40" y="310" width="60" height="4" rx="2" fill="white" opacity="0.6"/>
  <text x="40" y="345" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.6">비전솔루션</text>
</svg>
