<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" />
  <circle cx="720" cy="-30" r="220" fill="#6366f1" opacity="0.08"/>
  <circle cx="-20" cy="430" r="180" fill="#818cf8" opacity="0.06"/>
  <!-- Tag badge -->
  <rect x="40" y="40" width="84" height="28" rx="14" fill="#6366f1" opacity="0.4"/>
  <text x="82" y="59" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white">보안 점검</text>
  <!-- Shield card -->
  <rect x="490" y="55" width="270" height="310" rx="20" fill="white" opacity="0.06" stroke="#818cf8" stroke-opacity="0.25" stroke-width="1"/>
  <text x="625" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="#a5b4fc">8</text>
  <text x="625" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.75">가지 점검 항목</text>
  <text x="625" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="38">🛡️</text>
  <text x="625" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.5">초보자도 알 수 있는</text>
  <text x="625" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.5">웹보안 가이드</text>
  <!-- Main text -->
  <text x="40" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#a5b4fc" opacity="0.9">작은 홈페이지라도 안심 금물!</text>
  <text x="40" y="175" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="white">꼭 알아야 할</text>
  <text x="40" y="215" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="white">웹사이트 보안</text>
  <text x="40" y="255" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#a5b4fc">점검 8가지</text>
  <text x="40" y="300" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.6">해킹 피해 예방 — 초보자 완벽 가이드</text>
  <rect x="40" y="330" width="60" height="4" rx="2" fill="#6366f1" opacity="0.8"/>
  <text x="40" y="365" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.5">비전솔루션</text>
</svg>
