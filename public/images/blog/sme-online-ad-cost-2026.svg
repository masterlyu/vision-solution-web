<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" />
  <circle cx="700" cy="-50" r="200" fill="white" opacity="0.05"/>
  <circle cx="750" cy="420" r="150" fill="white" opacity="0.05"/>
  <!-- 태그 배지 -->
  <rect x="40" y="40" width="120" height="28" rx="14" fill="white" opacity="0.2"/>
  <text x="100" y="59" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="12" font-weight="700" fill="white">온라인마케팅</text>
  <!-- 우측 아이콘 카드 -->
  <rect x="480" y="60" width="280" height="300" rx="20" fill="url(#card1)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="620" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="80" fill="white" opacity="0.9">💰</text>
  <text x="620" y="235" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="white" opacity="0.7">네이버 · 구글 · 인스타</text>
  <text x="620" y="260" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="13" fill="white" opacity="0.5">2026 실전 비용 비교</text>
  <!-- 좌측 메인 텍스트 -->
  <text x="40" y="130" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" font-weight="600" fill="white" opacity="0.8">중소기업 온라인 광고</text>
  <text x="40" y="180" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="32" font-weight="900" fill="white">광고비, 어디서</text>
  <text x="40" y="220" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="32" font-weight="900" fill="white">써야 효과있나?</text>
  <text x="40" y="270" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="white" opacity="0.75">CPC · ROAS · 정부지원금 2026 실전 가이드</text>
  <rect x="40" y="310" width="60" height="4" rx="2" fill="white" opacity="0.6"/>
  <text x="40" y="345" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="14" fill="white" opacity="0.6">(주)비젼솔루션</text>
