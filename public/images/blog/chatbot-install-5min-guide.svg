  <text x="500" y="210" font-family="monospace" font-size="10" fill="#6ee7b7">&lt;script src=</text>
  <text x="500" y="226" font-family="monospace" font-size="9.5" fill="#7dd3fc">  "chatbot.visionc.co.kr/</text>
  <text x="500" y="242" font-family="monospace" font-size="9.5" fill="#7dd3fc">   embed.min.js"</text>
  <text x="500" y="258" font-family="monospace" font-size="10" fill="#6ee7b7">  defer&gt;&lt;/script&gt;</text>
