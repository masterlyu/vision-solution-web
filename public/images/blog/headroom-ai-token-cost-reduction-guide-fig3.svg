<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="200" fill="#ffffff"/>
  <text x="40" y="40" font-size="18" font-weight="800" fill="#1f2937">Headroom 프록시 모드 — 3단계 시작</text>
  <!-- 단계 1 -->
  <rect x="40" y="65" width="200" height="100" rx="12" fill="#0f766e"/>
  <text x="140" y="108" text-anchor="middle" font-size="16" font-weight="800" fill="#ffffff">① pip 설치</text>
  <text x="140" y="134" text-anchor="middle" font-size="11" fill="#a7f3d0">pip install headroom-ai</text>
  <!-- 화살표 -->
  <text x="265" y="122" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
  <!-- 단계 2 -->
  <rect x="300" y="65" width="200" height="100" rx="12" fill="#0891b2"/>
  <text x="400" y="108" text-anchor="middle" font-size="16" font-weight="800" fill="#ffffff">② 프록시 실행</text>
  <text x="400" y="134" text-anchor="middle" font-size="11" fill="#cffafe">headroom proxy --port 8080</text>
  <!-- 화살표 -->
  <text x="525" y="122" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
  <!-- 단계 3 -->
  <rect x="560" y="65" width="200" height="100" rx="12" fill="#22d3ee"/>
  <text x="660" y="108" text-anchor="middle" font-size="16" font-weight="800" fill="#083344">③ URL만 변경</text>
  <text x="660" y="134" text-anchor="middle" font-size="11" fill="#083344">localhost:8080/v1</text>
</svg>
