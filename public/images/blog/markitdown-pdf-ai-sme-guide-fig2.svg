<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="200" fill="#ffffff"/>
  <text x="40" y="40" font-size="18" font-weight="800" fill="#1f2937">MarkItDown 핵심 수치</text>
  <!-- 카드 1: GitHub 별점 -->
  <rect x="40" y="60" width="220" height="110" rx="12" fill="#eff6ff"/>
  <text x="150" y="116" text-anchor="middle" font-size="32" font-weight="900" fill="#2563eb">139K+</text>
  <text x="150" y="148" text-anchor="middle" font-size="13" fill="#6b7280">GitHub 별점 (2026.06 기준)</text>
  <!-- 카드 2: 지원 형식 수 -->
  <rect x="290" y="60" width="220" height="110" rx="12" fill="#eff6ff"/>
  <text x="400" y="116" text-anchor="middle" font-size="32" font-weight="900" fill="#2563eb">7+</text>
  <text x="400" y="148" text-anchor="middle" font-size="13" fill="#6b7280">지원 파일 형식 (PDF·Word 등)</text>
  <!-- 카드 3: 비용 -->
  <rect x="540" y="60" width="220" height="110" rx="12" fill="#eff6ff"/>
  <text x="650" y="116" text-anchor="middle" font-size="32" font-weight="900" fill="#0f766e">무료</text>
  <text x="650" y="148" text-anchor="middle" font-size="13" fill="#6b7280">오픈소스 · GPU 불필요</text>
</svg>
