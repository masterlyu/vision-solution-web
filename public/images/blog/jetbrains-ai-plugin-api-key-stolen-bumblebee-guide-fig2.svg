<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="200" fill="#ffffff"/>
  <text x="40" y="40" font-size="18" font-weight="800" fill="#1f2937">API 키 도난 시 실제 피해 규모</text>
  <!-- 박스 1 -->
  <rect x="40" y="60" width="210" height="110" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="145" y="100" text-anchor="middle" font-size="32" font-weight="900" fill="#dc2626">70,000</text>
  <text x="145" y="122" text-anchor="middle" font-size="13" fill="#1f2937">JetBrains 악성 플러그인</text>
  <text x="145" y="142" text-anchor="middle" font-size="12" fill="#6b7280">총 설치 횟수 (2026-06)</text>
  <!-- 박스 2 -->
  <rect x="295" y="60" width="210" height="110" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="400" y="100" text-anchor="middle" font-size="32" font-weight="900" fill="#dc2626">15개</text>
  <text x="400" y="122" text-anchor="middle" font-size="13" fill="#1f2937">발견된 악성 플러그인 수</text>
  <text x="400" y="142" text-anchor="middle" font-size="12" fill="#6b7280">AI 코딩 도구로 위장</text>
  <!-- 박스 3 -->
  <rect x="550" y="60" width="210" height="110" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="655" y="100" text-anchor="middle" font-size="32" font-weight="900" fill="#16a34a">30초</text>
  <text x="655" y="122" text-anchor="middle" font-size="13" fill="#1f2937">Bumblebee 스캔 시간</text>
  <text x="655" y="142" text-anchor="middle" font-size="12" fill="#6b7280">무료 오픈소스</text>
</svg>
