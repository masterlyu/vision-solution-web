<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="200" fill="#ffffff"/>
  <text x="40" y="40" font-size="18" font-weight="800" fill="#1f2937">Screenpipe 현황 (2026년 기준)</text>
  <!-- 카드 1: GitHub Stars -->
  <rect x="40" y="60" width="220" height="110" rx="12" fill="#f0fdfa"/>
  <text x="150" y="115" text-anchor="middle" font-size="32" font-weight="900" fill="#0f766e">19k+</text>
  <text x="150" y="148" text-anchor="middle" font-size="13" fill="#6b7280">GitHub Stars</text>
  <!-- 카드 2: YC 선정 -->
  <rect x="290" y="60" width="220" height="110" rx="12" fill="#f0fdfa"/>
  <text x="400" y="115" text-anchor="middle" font-size="32" font-weight="900" fill="#0f766e">YC S26</text>
  <text x="400" y="148" text-anchor="middle" font-size="13" fill="#6b7280">2026년 5월 선정</text>
  <!-- 카드 3: 무료 -->
  <rect x="540" y="60" width="220" height="110" rx="12" fill="#f0fdfa"/>
  <text x="650" y="115" text-anchor="middle" font-size="32" font-weight="900" fill="#0f766e">$0</text>
  <text x="650" y="148" text-anchor="middle" font-size="13" fill="#6b7280">CLI 무료 · 앱 $25/월</text>
</svg>
