<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="200" fill="#ffffff"/>
  <text x="40" y="40" font-size="18" font-weight="800" fill="#1f2937">중소기업 Claude 활용 시나리오 3가지</text>

  <!-- 시나리오 1 -->
  <rect x="40" y="60" width="210" height="110" rx="12" fill="#0f766e"/>
  <text x="145" y="95" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">① 메시지 응답</text>
  <text x="145" y="118" text-anchor="middle" font-size="12" fill="#a7f3d0">거래처 문의 20건</text>
  <text x="145" y="138" text-anchor="middle" font-size="12" fill="#a7f3d0">→ 답장 초안 일괄 생성</text>
  <text x="145" y="158" text-anchor="middle" font-size="11" fill="#6ee7b7">1시간 → 30초</text>

  <!-- 화살표 1 -->
  <text x="270" y="122" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>

  <!-- 시나리오 2 -->
  <rect x="295" y="60" width="210" height="110" rx="12" fill="#0891b2"/>
  <text x="400" y="95" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">② 보고서 초안</text>
  <text x="400" y="118" text-anchor="middle" font-size="12" fill="#cffafe">매출 데이터 입력</text>
  <text x="400" y="138" text-anchor="middle" font-size="12" fill="#cffafe">→ 월간 보고서 완성</text>
  <text x="400" y="158" text-anchor="middle" font-size="11" fill="#a5f3fc">반나절 → 20분</text>

  <!-- 화살표 2 -->
  <text x="525" y="122" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>

  <!-- 시나리오 3 -->
  <rect x="550" y="60" width="210" height="110" rx="12" fill="#22d3ee"/>
  <text x="655" y="95" text-anchor="middle" font-size="14" font-weight="800" fill="#083344">③ 계약서 초안</text>
  <text x="655" y="118" text-anchor="middle" font-size="12" fill="#083344">조건 입력</text>
  <text x="655" y="138" text-anchor="middle" font-size="12" fill="#083344">→ 계약서 초안 생성</text>
  <text x="655" y="158" text-anchor="middle" font-size="11" fill="#164e63">법무 비용 절감</text>
</svg>
