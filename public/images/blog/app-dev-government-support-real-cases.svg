<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" />
  <circle cx="700" cy="-50" r="200" fill="white" opacity="0.05"/>
  <circle cx="750" cy="420" r="150" fill="white" opacity="0.05"/>
  <!-- 태그 배지 -->
  <rect x="40" y="40" width="100" height="28" rx="14" fill="white" opacity="0.2"/>
  <text x="90" y="59" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white">앱 개발</text>
  <!-- 우측 아이콘 카드 -->
  <rect x="480" y="60" width="280" height="300" rx="20" fill="url(#card1)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="620" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="80" fill="white" opacity="0.9">📱</text>
  <text x="620" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.7">정부 지원사업</text>
  <text x="620" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.5">최대 300만원</text>
  <!-- 좌측 메인 텍스트 -->
  <text x="40" y="130" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" opacity="0.8">소상공인 디지털 전환</text>
  <text x="40" y="180" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="white">앱 개발 비용</text>
  <text x="40" y="222" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="white">0원도 가능?</text>
  <text x="40" y="270" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.75">정부 지원금 실제 수령 사례 공개</text>
  <rect x="40" y="310" width="60" height="4" rx="2" fill="white" opacity="0.6"/>
  <text x="40" y="345" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.6">(주)비젼솔루션</text>
</svg>
