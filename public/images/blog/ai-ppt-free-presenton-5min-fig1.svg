<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="300" fill="#ffffff"/>
  <text x="40" y="44" font-size="20" font-weight="800" fill="#1f2937">Presenton vs Gamma — 핵심 비교</text>

  <!-- 헤더 행 -->
  <rect x="40" y="60" width="200" height="36" rx="4" fill="#f1f5f9"/>
  <rect x="250" y="60" width="240" height="36" rx="4" fill="#0f766e"/>
  <rect x="500" y="60" width="240" height="36" rx="4" fill="#1e40af"/>
  <text x="140" y="83" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280">항목</text>
  <text x="370" y="83" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">Presenton (무료)</text>
  <text x="620" y="83" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">Gamma Pro</text>

  <!-- 데이터 행 1 -->
  <rect x="40" y="100" width="200" height="34" rx="2" fill="#f8fafc"/>
  <rect x="250" y="100" width="240" height="34" rx="2" fill="#f0fdf4"/>
  <rect x="500" y="100" width="240" height="34" rx="2" fill="#f8fafc"/>
  <text x="140" y="122" text-anchor="middle" font-size="13" fill="#374151">월 비용</text>
  <text x="370" y="122" text-anchor="middle" font-size="14" font-weight="800" fill="#16a34a">완전 무료</text>
  <text x="620" y="122" text-anchor="middle" font-size="13" fill="#374151">$20/월 (약 2만 7천원)</text>

  <!-- 데이터 행 2 -->
  <rect x="40" y="138" width="200" height="34" rx="2" fill="#f8fafc"/>
  <rect x="250" y="138" width="240" height="34" rx="2" fill="#f0fdf4"/>
  <rect x="500" y="138" width="240" height="34" rx="2" fill="#f8fafc"/>
  <text x="140" y="160" text-anchor="middle" font-size="13" fill="#374151">PPTX 출력</text>
  <text x="370" y="160" text-anchor="middle" font-size="13" fill="#16a34a">✅ 완전 편집 가능</text>
  <text x="620" y="160" text-anchor="middle" font-size="13" fill="#374151">✅ 가능</text>

  <!-- 데이터 행 3 -->
  <rect x="40" y="176" width="200" height="34" rx="2" fill="#f8fafc"/>
  <rect x="250" y="176" width="240" height="34" rx="2" fill="#f0fdf4"/>
  <rect x="500" y="176" width="240" height="34" rx="2" fill="#f8fafc"/>
  <text x="140" y="198" text-anchor="middle" font-size="13" fill="#374151">데이터 보안</text>
  <text x="370" y="198" text-anchor="middle" font-size="13" fill="#16a34a">✅ 내 서버 보관</text>
  <text x="620" y="198" text-anchor="middle" font-size="13" fill="#374151">외부 서버 저장</text>

  <!-- 데이터 행 4 -->
  <rect x="40" y="214" width="200" height="34" rx="2" fill="#f8fafc"/>
  <rect x="250" y="214" width="240" height="34" rx="2" fill="#f0fdf4"/>
  <rect x="500" y="214" width="240" height="34" rx="2" fill="#f8fafc"/>
  <text x="140" y="236" text-anchor="middle" font-size="13" fill="#374151">AI 모델 선택</text>
  <text x="370" y="236" text-anchor="middle" font-size="13" fill="#16a34a">OpenAI·Gemini·Ollama 등</text>
  <text x="620" y="236" text-anchor="middle" font-size="13" fill="#374151">Gamma 자체 AI</text>

  <text x="40" y="285" font-size="11" fill="#9ca3af">출처: presenton.ai, gamma.app/pricing (2026년 6월 기준)</text>
</svg>
