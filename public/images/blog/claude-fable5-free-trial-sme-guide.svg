  <!-- 우측 아이콘 카드 -->
  <rect x="490" y="60" width="270" height="300" rx="20" fill="url(#card1)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="625" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="80" fill="white" opacity="0.9">🤖</text>
  <text x="625" y="230" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="14" fill="white" opacity="0.8">Claude Fable 5</text>
  <text x="625" y="255" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="13" fill="white" opacity="0.6">SWE-bench 80.3%</text>
  <text x="625" y="280" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="12" fill="white" opacity="0.5">6월 22일까지 무료</text>
