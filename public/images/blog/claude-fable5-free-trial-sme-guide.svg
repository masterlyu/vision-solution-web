    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" />
  <circle cx="700" cy="-50" r="200" fill="white" opacity="0.05"/>
  <circle cx="750" cy="420" r="150" fill="white" opacity="0.05"/>
  <!-- 태그 배지 -->
  <rect x="40" y="40" width="90" height="28" rx="14" fill="white" opacity="0.2"/>
  <text x="85" y="59" text-anchor="middle" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="12" font-weight="700" fill="white">AI 활용</text>
  <!-- D-day 배지 -->
  <rect x="145" y="40" width="80" height="28" rx="14" fill="#fbbf24" opacity="0.9"/>
