<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="300" fill="#ffffff"/>
  <text x="40" y="44" font-size="20" font-weight="800" fill="#1f2937">AI 직원 서비스 월 비용 비교</text>

  <!-- Google Gemini Spark 막대 (가장 높음) -->
  <rect x="80" y="80" width="120" height="170" rx="6" fill="#e5e7eb"/>
  <text x="140" y="65" text-anchor="middle" font-size="22" font-weight="800" fill="#6b7280">$100</text>
  <text x="140" y="270" text-anchor="middle" font-size="13" fill="#1f2937">Gemini Spark</text>
  <text x="140" y="288" text-anchor="middle" font-size="11" fill="#9ca3af">미국 베타</text>

  <!-- Dify Cloud 유료 막대 -->
  <rect x="260" y="140" width="120" height="110" rx="6" fill="#99f6e4"/>
  <text x="320" y="125" text-anchor="middle" font-size="22" font-weight="800" fill="#0f766e">$59~</text>
  <text x="320" y="270" text-anchor="middle" font-size="13" fill="#1f2937">Dify Cloud</text>
  <text x="320" y="288" text-anchor="middle" font-size="11" fill="#9ca3af">유료 플랜</text>

  <!-- Dify 셀프호스팅 막대 -->
  <rect x="440" y="200" width="120" height="50" rx="6" fill="#06b6d4"/>
  <text x="500" y="188" text-anchor="middle" font-size="22" font-weight="800" fill="#06b6d4">서버비만</text>
  <text x="500" y="270" text-anchor="middle" font-size="13" fill="#1f2937">Dify 셀프호스팅</text>
  <text x="500" y="288" text-anchor="middle" font-size="11" fill="#9ca3af">1~5만원/월</text>

  <!-- Dify 무료 막대 -->
  <rect x="620" y="230" width="120" height="20" rx="6" fill="#0f766e"/>
  <text x="680" y="220" text-anchor="middle" font-size="22" font-weight="800" fill="#0f766e">$0</text>
  <text x="680" y="270" text-anchor="middle" font-size="13" fill="#1f2937">Dify Cloud</text>
  <text x="680" y="288" text-anchor="middle" font-size="11" fill="#9ca3af">무료 플랜</text>
</svg>
