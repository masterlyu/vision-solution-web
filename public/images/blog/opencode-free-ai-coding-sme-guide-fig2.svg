  <!-- 화살표 -->
  <text x="258" y="120" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
  <!-- 단계 2 -->
  <rect x="300" y="65" width="200" height="95" rx="12" fill="#0891b2"/>
