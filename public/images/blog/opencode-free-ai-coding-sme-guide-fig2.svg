  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#cffafe">Claude·GPT API Key</text>
  <!-- 화살표 -->
  <text x="518" y="120" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
  <!-- 단계 3 -->
