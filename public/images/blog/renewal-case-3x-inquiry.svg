      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" />
  <circle cx="700" cy="-50" r="200" fill="white" opacity="0.05"/>
  <circle cx="-50" cy="380" r="160" fill="white" opacity="0.04"/>
  <!-- Tag badge -->
  <rect x="40" y="40" width="90" height="28" rx="14" fill="white" opacity="0.2"/>
