<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" width="760" height="180">
  <defs>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="760" height="180" fill="#f0fdfa" rx="12"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0f766e">pyVideoTrans 자동 처리 흐름</text>

  <!-- Step boxes -->
  <!-- Step 1: 원본 영상 -->
  <rect x="20" y="50" width="120" height="100" rx="10" fill="url(#stepGrad)" opacity="0.15" stroke="#0f766e" stroke-width="1.5"/>
  <text x="80" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🎥</text>
  <text x="80" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#0f766e">원본 영상</text>
  <text x="80" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">중국어·영어 등</text>

  <!-- Arrow -->
  <line x1="143" y1="100" x2="163" y2="100" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="153" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">AI</text>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0f766e"/>
    </marker>
  </defs>

  <!-- Step 2: 음성 인식(STT) -->
  <rect x="165" y="50" width="120" height="100" rx="10" fill="url(#stepGrad)" opacity="0.15" stroke="#0f766e" stroke-width="1.5"/>
  <text x="225" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🎙️</text>
  <text x="225" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#0f766e">음성 인식</text>
  <text x="225" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">말 → 텍스트(STT)</text>

  <!-- Arrow -->
  <line x1="288" y1="100" x2="308" y2="100" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="298" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">AI</text>

  <!-- Step 3: 번역 -->
  <rect x="310" y="50" width="120" height="100" rx="10" fill="url(#stepGrad)" opacity="0.15" stroke="#0f766e" stroke-width="1.5"/>
  <text x="370" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🌐</text>
  <text x="370" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#0f766e">AI 번역</text>
  <text x="370" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">한국어로 자동 변환</text>

  <!-- Arrow -->
  <line x1="433" y1="100" x2="453" y2="100" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="443" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">AI</text>

  <!-- Step 4: TTS 더빙 -->
  <rect x="455" y="50" width="120" height="100" rx="10" fill="url(#stepGrad)" opacity="0.15" stroke="#0f766e" stroke-width="1.5"/>
  <text x="515" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🔊</text>
  <text x="515" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#0f766e">AI 더빙</text>
  <text x="515" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">텍스트 → 음성(TTS)</text>

  <!-- Arrow -->
  <line x1="578" y1="100" x2="598" y2="100" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="588" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">자동</text>

  <!-- Step 5: 완성 영상 -->
  <rect x="600" y="50" width="140" height="100" rx="10" fill="#0f766e" opacity="0.9"/>
  <text x="670" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">✅</text>
  <text x="670" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white">한국어 더빙 영상</text>
  <text x="670" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white" opacity="0.85">완전 자동 · 무료</text>

  <!-- Bottom label -->
  <text x="380" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">코딩 없이 클릭 한 번 — pyVideoTrans (github.com/jianchang512/pyvideotrans)</text>
</svg>
