<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="200" fill="#ffffff"/>
  <text x="40" y="40" font-size="18" font-weight="800" fill="#1f2937">VibeVoice 로컬 설치 3단계</text>
  <!-- 단계 1 -->
  <rect x="40" y="65" width="200" height="95" rx="12" fill="#0f766e"/>
  <text x="140" y="105" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">① 저장소 클론</text>
  <text x="140" y="130" text-anchor="middle" font-size="12" fill="#a7f3d0">git clone</text>
  <text x="140" y="148" text-anchor="middle" font-size="11" fill="#a7f3d0">+ 패키지 설치</text>
  <!-- 화살표 -->
  <text x="265" y="120" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
  <!-- 단계 2 -->
  <rect x="300" y="65" width="200" height="95" rx="12" fill="#0891b2"/>
  <text x="400" y="105" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">② 목소리 녹음</text>
  <text x="400" y="130" text-anchor="middle" font-size="12" fill="#cffafe">20~30초 WAV</text>
  <text x="400" y="148" text-anchor="middle" font-size="11" fill="#cffafe">조용한 환경 필수</text>
  <!-- 화살표 -->
  <text x="525" y="120" text-anchor="middle" font-size="28" fill="#94a3b8">→</text>
  <!-- 단계 3 -->
  <rect x="560" y="65" width="200" height="95" rx="12" fill="#22d3ee"/>
  <text x="660" y="105" text-anchor="middle" font-size="15" font-weight="800" fill="#083344">③ 나레이션 생성</text>
  <text x="660" y="130" text-anchor="middle" font-size="12" fill="#083344">텍스트 입력</text>
  <text x="660" y="148" text-anchor="middle" font-size="11" fill="#083344">→ output.wav 완성</text>
</svg>
