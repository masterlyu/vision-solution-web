<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="200" fill="#ffffff"/>
  <text x="40" y="40" font-size="18" font-weight="800" fill="#1f2937">YouTube AI 영상 생성 핵심 수치</text>
  <!-- 카드 1: 무료 -->
  <rect x="40" y="64" width="220" height="110" rx="12" fill="#f0fdfa"/>
  <text x="150" y="118" text-anchor="middle" font-size="36" font-weight="900" fill="#0f766e">0원</text>
  <text x="150" y="148" text-anchor="middle" font-size="13" fill="#6b7280">기본 AI 클립 생성</text>
  <text x="150" y="165" text-anchor="middle" font-size="11" fill="#9ca3af">(구글 계정만 필요)</text>
  <!-- 카드 2: 10초 -->
  <rect x="290" y="64" width="220" height="110" rx="12" fill="#eff6ff"/>
  <text x="400" y="118" text-anchor="middle" font-size="36" font-weight="900" fill="#2563eb">10초</text>
  <text x="400" y="148" text-anchor="middle" font-size="13" fill="#6b7280">무료 최대 클립 길이</text>
  <text x="400" y="165" text-anchor="middle" font-size="11" fill="#9ca3af">(SynthID 워터마크 포함)</text>
  <!-- 카드 3: $20/월 -->
  <rect x="540" y="64" width="220" height="110" rx="12" fill="#faf5ff"/>
  <text x="650" y="118" text-anchor="middle" font-size="36" font-weight="900" fill="#7c3aed">$20/월</text>
  <text x="650" y="148" text-anchor="middle" font-size="13" fill="#6b7280">워터마크 제거 + 긴 클립</text>
  <text x="650" y="165" text-anchor="middle" font-size="11" fill="#9ca3af">(Google One AI Premium)</text>
</svg>
