<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="300" fill="#ffffff"/>
  <text x="40" y="44" font-size="20" font-weight="800" fill="#1f2937">경쟁사 분석 업무 Before → After</text>

  <!-- Before bar -->
  <rect x="100" y="80" width="200" height="150" rx="6" fill="#cbd5e1"/>
  <text x="200" y="68" text-anchor="middle" font-size="22" font-weight="800" fill="#6b7280">2~3시간</text>
  <text x="200" y="275" text-anchor="middle" font-size="15" fill="#1f2937">Before · 수동 조사</text>

  <!-- Arrow -->
  <text x="390" y="170" text-anchor="middle" font-size="36" fill="#0f766e">→</text>

  <!-- After bar -->
  <rect x="500" y="200" width="200" height="30" rx="6" fill="#0f766e"/>
  <text x="600" y="188" text-anchor="middle" font-size="22" font-weight="800" fill="#0f766e">5분</text>
  <text x="600" y="275" text-anchor="middle" font-size="15" fill="#1f2937">After · DeerFlow 자동화</text>

  <!-- Labels inside bars -->
  <text x="200" y="155" text-anchor="middle" font-size="13" fill="#6b7280">인터넷 검색</text>
  <text x="200" y="175" text-anchor="middle" font-size="13" fill="#6b7280">엑셀 정리</text>
  <text x="200" y="195" text-anchor="middle" font-size="13" fill="#6b7280">보고서 작성</text>

  <text x="600" y="220" text-anchor="middle" font-size="12" fill="white">프롬프트 입력만</text>
</svg>
