<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" />
  <circle cx="700" cy="-50" r="200" fill="white" opacity="0.05"/>
  <circle cx="750" cy="420" r="150" fill="white" opacity="0.05"/>
  <!-- 태그 배지 -->
  <rect x="40" y="40" width="90" height="28" rx="14" fill="white" opacity="0.2"/>
  <text x="85" y="59" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white">앱 개발</text>
  <!-- 우측 아이콘 카드 -->
  <rect x="490" y="60" width="270" height="300" rx="20" fill="url(#card1)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="625" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="80" fill="white" opacity="0.9">💬</text>
  <text x="625" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.7">문자로 안부 전달</text>
  <text x="625" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.5">Google Play 무료 출시</text>
  <!-- 좌측 메인 텍스트 -->
  <text x="40" y="130" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" opacity="0.8">1인 가구 안부 확인 앱</text>
  <text x="40" y="185" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="white">오늘도 안녕</text>
  <text x="40" y="235" font-family="Arial, sans-serif" font-size="17" fill="white" opacity="0.85">'죽었니' 앱의 긍정적 한국판</text>
  <text x="40" y="270" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.65">버튼 하나로 보내는 매일의 안부</text>
  <rect x="40" y="310" width="60" height="4" rx="2" fill="white" opacity="0.6"/>
  <text x="40" y="345" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.6">비전솔루션</text>
</svg>
