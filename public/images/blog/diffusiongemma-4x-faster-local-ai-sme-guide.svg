<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" />
  <circle cx="700" cy="-50" r="200" fill="white" opacity="0.05"/>
  <circle cx="750" cy="420" r="150" fill="white" opacity="0.05"/>
  <!-- 태그 배지 -->
  <rect x="40" y="40" width="90" height="28" rx="14" fill="white" opacity="0.2"/>
  <text x="85" y="59" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white">AI 활용</text>
  <!-- 우측 아이콘 카드 -->
  <rect x="480" y="60" width="280" height="300" rx="20" fill="url(#card1)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="620" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="80" fill="white" opacity="0.9">⚡</text>
  <text x="620" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white" opacity="0.85">DiffusionGemma</text>
  <text x="620" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.6">Google DeepMind · 2026.06.10</text>
  <text x="620" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.55">Apache 2.0 · 무료 오픈소스</text>
  <!-- 좌측 메인 텍스트 -->
  <text x="40" y="135" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" opacity="0.8">중소기업 AI 도입 가이드</text>
  <text x="40" y="183" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="white">구글 무료 AI,</text>
  <text x="40" y="225" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="white">4배 빠르다</text>
  <text x="40" y="272" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.75">내 PC에서 지금 바로 실행 가능</text>
  <rect x="40" y="310" width="60" height="4" rx="2" fill="white" opacity="0.6"/>
  <text x="40" y="348" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.6">(주)비젼솔루션</text>
