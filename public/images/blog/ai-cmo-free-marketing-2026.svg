  <text x="40" y="130" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" opacity="0.8">중소기업 마케팅 자동화</text>
  <text x="40" y="175" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="white">월 13만원 AI 마케팅</text>
  <text x="40" y="215" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="white">직원, 진짜 쓸까</text>
  <text x="40" y="265" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.75">무료 도구로 한국 중소기업이 직접 하는 법</text>
  <rect x="40" y="310" width="60" height="4" rx="2" fill="white" opacity="0.6"/>
  <text x="40" y="345" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.6">(주)비젼솔루션</text>
