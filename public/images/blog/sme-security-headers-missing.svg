<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#991b1b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" />
  <circle cx="700" cy="-50" r="200" fill="white" opacity="0.05"/>
  <circle cx="-50" cy="380" r="160" fill="white" opacity="0.04"/>
  <!-- Tag badge -->
  <rect x="40" y="40" width="80" height="28" rx="14" fill="white" opacity="0.2"/>
  <text x="80" y="59" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white">보안 경고</text>
  <!-- Warning card -->
  <rect x="480" y="60" width="280" height="300" rx="20" fill="white" opacity="0.1" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="620" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="65" font-weight="900" fill="#fbbf24">83%</text>
  <text x="620" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.8">중소기업 사이트</text>
  <text x="620" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.8">기본 보안 헤더 없음</text>
  <text x="620" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="40">⚠️</text>
  <!-- Main text -->
  <text x="40" y="130" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" opacity="0.8">100개 사이트 점검 결과</text>
  <text x="40" y="175" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="white">10곳 중 8곳</text>
  <text x="40" y="215" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="white">보안 헤더 없음</text>
  <text x="40" y="265" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.75">실제 공격 시나리오와 대응법</text>
  <rect x="40" y="310" width="60" height="4" rx="2" fill="white" opacity="0.6"/>
  <text x="40" y="345" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.6">비전솔루션</text>
</svg>
