<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="220" fill="#ffffff"/>
  <text x="40" y="40" font-size="18" font-weight="800" fill="#1f2937">OpenMontage 자동화 파이프라인 — 5단계</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="30" y="65" width="120" height="70" rx="10" fill="#0f766e" opacity="0.9"/>
  <text x="90" y="95" text-anchor="middle" font-size="22" fill="white">🔍</text>
  <text x="90" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="white">① 리서치</text>

  <!-- Arrow -->
  <polygon points="162,100 178,93 178,107" fill="#06b6d4"/>
  <line x1="150" y1="100" x2="178" y2="100" stroke="#06b6d4" stroke-width="2"/>

  <!-- Step 2 -->
  <rect x="190" y="65" width="120" height="70" rx="10" fill="#0e7490" opacity="0.9"/>
  <text x="250" y="95" text-anchor="middle" font-size="22" fill="white">📝</text>
  <text x="250" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="white">② 스크립트</text>

  <!-- Arrow -->
  <polygon points="322,100 338,93 338,107" fill="#06b6d4"/>
  <line x1="310" y1="100" x2="338" y2="100" stroke="#06b6d4" stroke-width="2"/>

  <!-- Step 3 -->
  <rect x="350" y="65" width="120" height="70" rx="10" fill="#0369a1" opacity="0.9"/>
  <text x="410" y="95" text-anchor="middle" font-size="22" fill="white">🎨</text>
  <text x="410" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="white">③ 에셋 생성</text>

  <!-- Arrow -->
  <polygon points="482,100 498,93 498,107" fill="#06b6d4"/>
  <line x1="470" y1="100" x2="498" y2="100" stroke="#06b6d4" stroke-width="2"/>

  <!-- Step 4 -->
  <rect x="510" y="65" width="120" height="70" rx="10" fill="#1d4ed8" opacity="0.9"/>
  <text x="570" y="95" text-anchor="middle" font-size="22" fill="white">✂️</text>
  <text x="570" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="white">④ 편집</text>

  <!-- Arrow -->
  <polygon points="642,100 658,93 658,107" fill="#06b6d4"/>
  <line x1="630" y1="100" x2="658" y2="100" stroke="#06b6d4" stroke-width="2"/>

  <!-- Step 5 -->
  <rect x="670" y="65" width="110" height="70" rx="10" fill="#7c3aed" opacity="0.9"/>
  <text x="725" y="95" text-anchor="middle" font-size="22" fill="white">🎬</text>
  <text x="725" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="white">⑤ 렌더링</text>

  <!-- Bottom label -->
  <text x="400" y="175" text-anchor="middle" font-size="13" fill="#6b7280">모든 단계가 자동 · 사용자 개입 불필요 · 소요 시간 약 15~30분</text>
  <text x="400" y="200" text-anchor="middle" font-size="12" fill="#9ca3af">52개 도구 · 500개+ 에이전트 스킬 협력</text>
</svg>
