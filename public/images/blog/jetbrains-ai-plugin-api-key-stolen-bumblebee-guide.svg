<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" />
  <circle cx="700" cy="-50" r="200" fill="white" opacity="0.05"/>
  <circle cx="750" cy="420" r="150" fill="white" opacity="0.05"/>
  <!-- 태그 배지 -->
  <rect x="40" y="40" width="100" height="28" rx="14" fill="white" opacity="0.2"/>
  <text x="90" y="59" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white">보안 경고</text>
  <!-- 우측 아이콘 카드 -->
  <rect x="480" y="60" width="280" height="300" rx="20" fill="url(#card1)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="620" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="80" fill="white" opacity="0.9">🔑</text>
  <text x="620" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.7">70,000회 설치 · API 키 도난</text>
  <text x="620" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.5">JetBrains 악성 플러그인 2026</text>
  <text x="620" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#fbbf24" opacity="0.9">Bumblebee로 30초 점검</text>
  <!-- 좌측 메인 텍스트 -->
  <text x="40" y="130" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" opacity="0.8">AI 보안 가이드</text>
  <text x="40" y="178" font-family="Arial, sans-serif" font-size="29" font-weight="900" fill="white">AI 플러그인에</text>
  <text x="40" y="218" font-family="Arial, sans-serif" font-size="29" font-weight="900" fill="white">API 키 털렸다</text>
  <text x="40" y="270" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.75">내 컴퓨터 30초 무료 점검법</text>
  <rect x="40" y="310" width="60" height="4" rx="2" fill="white" opacity="0.6"/>
  <text x="40" y="345" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.6">(주)비젼솔루션</text>
</svg>
