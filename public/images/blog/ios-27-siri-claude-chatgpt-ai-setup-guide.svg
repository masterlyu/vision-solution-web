<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cc785c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8a87c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" />
  <!-- Background glow -->
  <circle cx="700" cy="50" r="200" fill="#7c3aed" opacity="0.06"/>
  <circle cx="100" cy="380" r="150" fill="#cc785c" opacity="0.06"/>
  <!-- Tag badge -->
  <rect x="40" y="40" width="90" height="28" rx="14" fill="#7c3aed" opacity="0.25"/>
  <text x="85" y="59" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#c4b5fd">AI 활용</text>
  <!-- Right panel: phone mockup -->
  <rect x="510" y="45" width="240" height="340" rx="24" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.1" stroke-width="1.5"/>
  <!-- Phone screen -->
  <rect x="530" y="75" width="200" height="280" rx="12" fill="#111827" opacity="0.8"/>
  <!-- Before chip -->
  <rect x="545" y="92" width="80" height="22" rx="11" fill="#374151"/>
  <text x="585" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af">Before: 시리</text>
  <!-- X mark -->
  <text x="585" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="34">❌</text>
  <!-- Arrow down -->
  <text x="630" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#6b7280">↓</text>
  <!-- After chip -->
  <rect x="545" y="215" width="80" height="22" rx="11" fill="url(#aiGrad)" opacity="0.8"/>
  <text x="585" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="700">After: 클로드</text>
  <!-- Check mark -->
  <text x="585" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="34">✅</text>
  <!-- iOS 27 badge -->
  <rect x="545" y="308" width="170" height="26" rx="13" fill="#7c3aed" opacity="0.3"/>
  <text x="630" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#c4b5fd">iOS 27 WWDC 2026</text>
  <!-- Main headline -->
  <text x="40" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" opacity="0.55">Apple WWDC 2026 발표</text>
  <text x="40" y="180" font-family="Arial, sans-serif" font-size="27" font-weight="900" fill="white">시리 대신</text>
  <text x="40" y="220" font-family="Arial, sans-serif" font-size="27" font-weight="900" fill="white">클로드·챗GPT</text>
  <text x="40" y="260" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#c4b5fd">설정 5분이면 됩니다</text>
  <!-- Accent line -->
  <rect x="40" y="278" width="55" height="4" rx="2" fill="url(#accent)" opacity="0.9"/>
  <!-- Sub info -->
  <text x="40" y="308" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.45">2026.06.10</text>
  <!-- Footer -->
  <text x="40" y="375" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.35">visionc.co.kr</text>
</svg>
