<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2e1065;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 장식 원 -->
  <circle cx="1050" cy="100" r="180" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <circle cx="1050" cy="100" r="120" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
  <circle cx="150" cy="500" r="140" fill="none" stroke="#6d28d9" stroke-width="1" opacity="0.25"/>

  <!-- 격자 패턴 -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7c3aed" stroke-width="0.3" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- 방패 아이콘 (배경 장식) -->
  <path d="M 960 180 L 960 120 Q 1000 110 1040 120 L 1040 180 Q 1020 220 1000 230 Q 980 220 960 180 Z"
        fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.4"/>
  <path d="M 975 175 L 975 130 Q 1000 122 1025 130 L 1025 175 Q 1008 208 1000 215 Q 992 208 975 175 Z"
        fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.5"/>

  <!-- 메인 카드 -->
  <rect x="80" y="80" width="680" height="470" rx="20" fill="url(#card)" stroke="#6d28d9" stroke-width="1.5" opacity="0.95"/>

  <!-- 상단 퍼플 바 -->
  <rect x="80" y="80" width="680" height="6" rx="3" fill="#7c3aed"/>

  <!-- 태그 -->
  <rect x="108" y="116" width="120" height="28" rx="14" fill="#4c1d95"/>
  <text x="168" y="134" font-family="Arial, sans-serif" font-size="13" fill="#c4b5fd" text-anchor="middle">웹 보안 진단</text>

  <!-- 메인 제목 -->
  <text x="108" y="195" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#ffffff">내 홈페이지는</text>
  <text x="108" y="248" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#a78bfa">해킹에 안전할까요?</text>

  <!-- 부제목 -->
  <text x="108" y="296" font-family="Arial, sans-serif" font-size="19" fill="#c4b5fd">AI 웹 보안 진단 리포트 실제 결과 공개</text>
  <text x="108" y="322" font-family="Arial, sans-serif" font-size="16" fill="#8b7ec8">visionc.co.kr · 종합 등급 A / 96점</text>

  <!-- 구분선 -->
  <line x1="108" y1="348" x2="680" y2="348" stroke="#4c1d95" stroke-width="1.5"/>

  <!-- 점수 카드 4개 -->
  <rect x="108" y="370" width="138" height="80" rx="10" fill="#2e1065" stroke="#5b21b6" stroke-width="1"/>
  <text x="177" y="398" font-family="Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">보안</text>
  <text x="177" y="430" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#10b981" text-anchor="middle">100</text>

  <rect x="258" y="370" width="138" height="80" rx="10" fill="#2e1065" stroke="#5b21b6" stroke-width="1"/>
  <text x="327" y="398" font-family="Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">SEO</text>
  <text x="327" y="430" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#14b8a6" text-anchor="middle">100</text>

  <rect x="408" y="370" width="138" height="80" rx="10" fill="#2e1065" stroke="#5b21b6" stroke-width="1"/>
  <text x="477" y="398" font-family="Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">성능</text>
  <text x="477" y="430" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#f59e0b" text-anchor="middle">86</text>

  <rect x="558" y="370" width="138" height="80" rx="10" fill="#2e1065" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="627" y="398" font-family="Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">종합</text>
  <text x="627" y="430" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#a78bfa" text-anchor="middle">96</text>

  <!-- 하단 CTA -->
  <text x="108" y="490" font-family="Arial, sans-serif" font-size="15" fill="#6d5bdb">visionc.co.kr에서 무료 보안 진단 받기</text>

  <!-- 오른쪽 장식 영역 — 자물쇠 아이콘 -->
  <g transform="translate(820, 220)">
    <!-- 자물쇠 몸체 -->
    <rect x="30" y="60" width="120" height="90" rx="12" fill="#4c1d95" stroke="#7c3aed" stroke-width="2"/>
    <!-- 자물쇠 고리 -->
    <path d="M 50 60 L 50 35 Q 50 10 90 10 Q 130 10 130 35 L 130 60" fill="none" stroke="#7c3aed" stroke-width="8" stroke-linecap="round"/>
    <!-- 열쇠 구멍 -->
    <circle cx="90" cy="100" r="14" fill="#6d28d9"/>
    <rect x="84" y="112" width="12" height="20" rx="4" fill="#6d28d9"/>
    <!-- 체크 마크 -->
    <path d="M 65 100 L 80 115 L 115 80" fill="none" stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- 체크 리스트 장식 -->
  <g transform="translate(790, 360)" opacity="0.7">
    <rect width="300" height="170" rx="10" fill="#1e1b4b" stroke="#4c1d95" stroke-width="1"/>
    <text x="16" y="28" font-family="Arial, sans-serif" font-size="12" fill="#8b5cf6">보안 점검 항목</text>
    <line x1="10" y1="38" x2="290" y2="38" stroke="#4c1d95" stroke-width="1"/>

    <circle cx="30" cy="58" r="6" fill="#10b981"/>
    <text x="46" y="63" font-family="Arial, sans-serif" font-size="11" fill="#d1d5db">HTTPS 암호화 — 정상</text>
    <circle cx="30" cy="82" r="6" fill="#10b981"/>
    <text x="46" y="87" font-family="Arial, sans-serif" font-size="11" fill="#d1d5db">악성코드 — 미탐지</text>
    <circle cx="30" cy="106" r="6" fill="#10b981"/>
    <text x="46" y="111" font-family="Arial, sans-serif" font-size="11" fill="#d1d5db">보안 헤더 13개 — 전체 통과</text>
    <circle cx="30" cy="130" r="6" fill="#10b981"/>
    <text x="46" y="135" font-family="Arial, sans-serif" font-size="11" fill="#d1d5db">민감 파일 30경로 — 노출 없음</text>
    <circle cx="30" cy="154" r="6" fill="#10b981"/>
    <text x="46" y="159" font-family="Arial, sans-serif" font-size="11" fill="#d1d5db">SPF / DMARC 이메일 보안 — 설정됨</text>
  </g>

  <!-- 브랜드 -->
  <text x="1120" y="60" font-family="Arial, sans-serif" font-size="14" fill="#6d5bdb" text-anchor="end" opacity="0.7">Vision Solution</text>
</svg>
