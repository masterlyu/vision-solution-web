  <rect x="290" y="72" width="220" height="180" rx="12" fill="#f0f9ff" stroke="#0369a1" stroke-width="1.5"/>
  <rect x="290" y="72" width="220" height="42" rx="12" fill="#0369a1"/>
  <rect x="290" y="102" width="220" height="12" fill="#0369a1"/>
