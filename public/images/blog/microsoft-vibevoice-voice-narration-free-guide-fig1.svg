  <!-- 구분선 -->
  <line x1="40" y1="58" x2="760" y2="58" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 카드 1: VibeVoice-1.5B -->
  <rect x="40" y="72" width="220" height="180" rx="12" fill="#f0fdfa" stroke="#0f766e" stroke-width="1.5"/>
  <rect x="40" y="72" width="220" height="42" rx="12" fill="#0f766e"/>
  <rect x="40" y="102" width="220" height="12" fill="#0f766e"/>
