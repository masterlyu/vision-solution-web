<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" />
  <circle cx="720" cy="-40" r="220" fill="white" opacity="0.04"/>
  <circle cx="780" cy="430" r="160" fill="white" opacity="0.04"/>

  <!-- 태그 배지 -->
  <rect x="40" y="38" width="100" height="26" rx="13" fill="white" opacity="0.18"/>
  <text x="90" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white">보안 점검</text>

  <!-- 우측 카드 — 비밀번호 목록 -->
  <rect x="470" y="50" width="290" height="320" rx="18" fill="url(#card)" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <text x="615" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white" opacity="0.6">해커가 가장 먼저 시도하는 비밀번호</text>

  <!-- 비밀번호 목록 -->
  <rect x="485" y="102" width="260" height="24" rx="4" fill="white" opacity="0.08"/>
  <text x="500" y="119" font-family="monospace" font-size="13" font-weight="700" fill="#f87171">1위  123456</text>
  <text x="720" y="119" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#fca5a5">1초 미만</text>

  <text x="500" y="145" font-family="monospace" font-size="12" fill="white" opacity="0.75">2위  password</text>
  <text x="720" y="145" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.6">1초 미만</text>

  <text x="500" y="168" font-family="monospace" font-size="12" fill="white" opacity="0.75">3위  123456789</text>
  <text x="720" y="168" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.6">1초 미만</text>

  <text x="500" y="191" font-family="monospace" font-size="12" fill="white" opacity="0.65">4위  12345678</text>
  <text x="720" y="191" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.55">1초 미만</text>

  <text x="500" y="214" font-family="monospace" font-size="12" fill="white" opacity="0.55">5위  12345</text>
  <text x="720" y="214" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.45">1초 미만</text>

  <text x="500" y="237" font-family="monospace" font-size="12" fill="white" opacity="0.50">6위  iloveyou</text>
  <text x="720" y="237" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.40">1초 미만</text>

  <text x="500" y="258" font-family="monospace" font-size="11" fill="white" opacity="0.45">7 ~ 10위  모두 1초 미만</text>

  <text x="615" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.5">출처: NordPass 2023</text>

  <!-- 자물쇠 아이콘 -->
  <text x="615" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" fill="white" opacity="0.25">🔓</text>

  <!-- 좌측 메인 텍스트 -->
  <text x="40" y="120" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" opacity="0.7">당신의 비밀번호는 안전한가요?</text>
  <text x="40" y="170" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="white">해커가 뚫는 데</text>
  <text x="40" y="212" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#f87171">1초도 안 걸립니다</text>
  <text x="40" y="262" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.75">지금 당장 바꿔야 할</text>
  <text x="40" y="284" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.75">비밀번호 TOP 10 공개</text>

  <rect x="40" y="320" width="60" height="4" rx="2" fill="#f87171" opacity="0.8"/>
  <text x="40" y="358" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.55">(주)비젼솔루션</text>
</svg>
