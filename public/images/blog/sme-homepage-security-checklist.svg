<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" />
  <circle cx="700" cy="-50" r="200" fill="white" opacity="0.05"/>
  <circle cx="750" cy="450" r="180" fill="white" opacity="0.04"/>
  <!-- Tag badge -->
  <rect x="40" y="40" width="80" height="28" rx="14" fill="white" opacity="0.2"/>
  <text x="80" y="59" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white">보안 점검</text>
  <!-- Checklist card -->
  <rect x="480" y="60" width="280" height="300" rx="20" fill="white" opacity="0.1" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="620" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="60">🛡️</text>
  <text x="620" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="white">5가지</text>
  <text x="620" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">보안 체크리스트</text>
  <text x="620" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.6">지금 당장 확인하세요!</text>
  <!-- Main text -->
  <text x="40" y="130" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" opacity="0.8">소상공인 홈페이지</text>
  <text x="40" y="175" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="white">보안 점검</text>
  <text x="40" y="215" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="white">5가지 체크리스트</text>
  <text x="40" y="265" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.75">해킹 취약점을 지금 확인하세요</text>
  <rect x="40" y="310" width="60" height="4" rx="2" fill="white" opacity="0.6"/>
  <text x="40" y="345" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.6">비전솔루션</text>
</svg>
