<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="280" fill="#ffffff"/>
  <text x="40" y="44" font-size="20" font-weight="800" fill="#1f2937">TaxHacker vs 유료 SaaS 회계 서비스 비교</text>
  <!-- Header row -->
  <rect x="40" y="60" width="720" height="36" rx="6" fill="#f1f5f9"/>
  <text x="160" y="83" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">항목</text>
  <text x="360" y="83" text-anchor="middle" font-size="14" font-weight="700" fill="#0f766e">TaxHacker (무료)</text>
  <text x="560" y="83" text-anchor="middle" font-size="14" font-weight="700" fill="#6b7280">유료 SaaS</text>
  <!-- Row 1 -->
  <rect x="40" y="96" width="720" height="36" rx="0" fill="#ffffff"/>
  <line x1="40" y1="132" x2="760" y2="132" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="119" text-anchor="middle" font-size="13" fill="#374151">월 비용</text>
  <text x="360" y="119" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">건당 $0.001~0.003</text>
  <text x="560" y="119" text-anchor="middle" font-size="13" fill="#6b7280">월 $5~30 고정</text>
  <!-- Row 2 -->
  <rect x="40" y="132" width="720" height="36" rx="0" fill="#f8fafc"/>
  <line x1="40" y1="168" x2="760" y2="168" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="155" text-anchor="middle" font-size="13" fill="#374151">데이터 보관</text>
  <text x="360" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">내 서버 (완전 소유)</text>
  <text x="560" y="155" text-anchor="middle" font-size="13" fill="#6b7280">외부 서버</text>
  <!-- Row 3 -->
  <rect x="40" y="168" width="720" height="36" rx="0" fill="#ffffff"/>
  <line x1="40" y1="204" x2="760" y2="204" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="191" text-anchor="middle" font-size="13" fill="#374151">AI 모델 선택</text>
  <text x="360" y="191" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">GPT·Gemini·로컬LLM</text>
  <text x="560" y="191" text-anchor="middle" font-size="13" fill="#6b7280">고정 (변경 불가)</text>
  <!-- Row 4 -->
  <rect x="40" y="204" width="720" height="36" rx="0" fill="#f8fafc"/>
  <text x="160" y="227" text-anchor="middle" font-size="13" fill="#374151">통화 지원</text>
  <text x="360" y="227" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">170개국 + 암호화폐 14종</text>
  <text x="560" y="227" text-anchor="middle" font-size="13" fill="#6b7280">주요 통화 중심</text>
  <!-- Source note -->
  <text x="40" y="270" font-size="11" fill="#9ca3af">출처: TaxHacker GitHub README, BrightCoding 2026-04-14</text>
</svg>
