<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="320" fill="#ffffff"/>
  <!-- 제목 -->
  <text x="40" y="44" font-size="18" font-weight="800" fill="#1f2937">ChatGPT 메모리 성능 변화 (2024 → 2026)</text>
  <!-- 배경 구분선 -->
  <line x1="40" y1="260" x2="760" y2="260" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 항목 1: 사실 기억 -->
  <!-- 레이블 -->
  <text x="40" y="105" font-size="13" fill="#6b7280">사실 기억 성공률</text>
  <!-- 2024 바 (41.5%) -->
  <rect x="40" y="112" width="166" height="22" rx="4" fill="#cbd5e1"/>
  <text x="212" y="129" font-size="12" fill="#6b7280">41.5%</text>
  <!-- 2026 바 (82.8%) -->
  <rect x="40" y="138" width="331" height="22" rx="4" fill="#0d9488"/>
  <text x="377" y="155" font-size="12" font-weight="700" fill="#0f766e">82.8%</text>

  <!-- 항목 2: 선호도 반영 -->
  <text x="40" y="190" font-size="13" fill="#6b7280">선호도 반영</text>
  <!-- 2024 바 (31.4%) -->
  <rect x="40" y="197" width="126" height="22" rx="4" fill="#cbd5e1"/>
  <text x="172" y="214" font-size="12" fill="#6b7280">31.4%</text>
  <!-- 2026 바 (71.3%) -->
  <rect x="40" y="223" width="285" height="22" rx="4" fill="#0d9488"/>
  <text x="331" y="240" font-size="12" font-weight="700" fill="#0f766e">71.3%</text>

  <!-- 항목 3: 시간 인식 -->
  <text x="430" y="105" font-size="13" fill="#6b7280">시간 인식 정확도</text>
  <!-- 2024 바 (9.4%) -->
  <rect x="430" y="112" width="38" height="22" rx="4" fill="#cbd5e1"/>
  <text x="474" y="129" font-size="12" fill="#6b7280">9.4%</text>
  <!-- 2026 바 (75.1%) -->
  <rect x="430" y="138" width="300" height="22" rx="4" fill="#0d9488"/>
  <text x="736" y="155" font-size="12" font-weight="700" fill="#0f766e">75.1%</text>

  <!-- 범례 -->
  <rect x="430" y="197" width="14" height="14" rx="2" fill="#cbd5e1"/>
  <text x="450" y="209" font-size="12" fill="#6b7280">2024년 (이전)</text>
  <rect x="560" y="197" width="14" height="14" rx="2" fill="#0d9488"/>
  <text x="580" y="209" font-size="12" fill="#1f2937" font-weight="600">2026년 Dreaming V3</text>

  <!-- 출처 -->
  <text x="40" y="290" font-size="11" fill="#9ca3af">출처: OpenAI 내부 평가 (opentools.ai 인용) · 2026년 6월</text>
</svg>
