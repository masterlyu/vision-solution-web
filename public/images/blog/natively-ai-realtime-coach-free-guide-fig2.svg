  <text x="660" y="108" text-anchor="middle" font-size="16" font-weight="800" fill="#083344">&#9314; 실시간 제안</text>
  <text x="660" y="138" text-anchor="middle" font-size="12" fill="#083344">화면에 즉시 표시</text>
