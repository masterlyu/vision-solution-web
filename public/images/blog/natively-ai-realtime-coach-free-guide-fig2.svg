  <!-- Step 1 -->
  <rect x="40" y="70" width="200" height="90" rx="12" fill="#0f766e"/>
  <text x="140" y="108" text-anchor="middle" font-size="16" font-weight="800" fill="#ffffff">&#9312; 음성 캡처</text>
  <text x="140" y="138" text-anchor="middle" font-size="12" fill="#a7f3d0">마이크 + 스피커</text>
  <!-- Arrow -->
