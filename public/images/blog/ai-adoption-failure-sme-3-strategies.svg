<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0d0d16"/>

  <!-- Background grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1a1a2e" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1a1a2e" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1a1a2e" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1a1a2e" stroke-width="1"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <circle cx="1100" cy="530" r="100" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
  <circle cx="600" cy="315" r="280" fill="none" stroke="#1e1e3a" stroke-width="2"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="#7c3aed"/>

  <!-- Main title -->
  <text x="600" y="220" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1">AI 도입 실패 이유</text>

  <!-- Subtitle -->
  <text x="600" y="290" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="28" font-weight="400" fill="#a78bfa" text-anchor="middle">중소기업 공통 실수 3가지 &amp; AI 성공 전략</text>

  <!-- Three failure cards -->
  <!-- Card 1 -->
  <rect x="100" y="340" width="290" height="130" rx="12" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="245" y="385" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="15" font-weight="600" fill="#a78bfa" text-anchor="middle">실수 1</text>
  <text x="245" y="415" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">데이터 단절</text>
  <text x="245" y="445" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">AI에게 먹일 데이터가 없다</text>

  <!-- Card 2 -->
  <rect x="455" y="340" width="290" height="130" rx="12" fill="#1a1a2e" stroke="#2563eb" stroke-width="1.5"/>
  <text x="600" y="385" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="15" font-weight="600" fill="#60a5fa" text-anchor="middle">실수 2</text>
  <text x="600" y="415" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">거버넌스 부재</text>
  <text x="600" y="445" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">AI 사용 규칙이 없다</text>

  <!-- Card 3 -->
  <rect x="810" y="340" width="290" height="130" rx="12" fill="#1a1a2e" stroke="#059669" stroke-width="1.5"/>
  <text x="955" y="385" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="15" font-weight="600" fill="#34d399" text-anchor="middle">실수 3</text>
  <text x="955" y="415" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">목적 불명확</text>
  <text x="955" y="445" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">"일단 도입"의 함정</text>

  <!-- Bottom tag -->
  <rect x="460" y="510" width="280" height="44" rx="22" fill="#7c3aed" opacity="0.85"/>
  <text x="600" y="538" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="17" font-weight="600" fill="#ffffff" text-anchor="middle">Vision Solution AI 성공 전략</text>

  <!-- Source note -->
  <text x="600" y="600" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="12" fill="#475569" text-anchor="middle">출처: 지티티코리아, 디지털투데이 (2026-06-06)</text>
</svg>
