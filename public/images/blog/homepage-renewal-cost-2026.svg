<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)" />
  <!-- Decorative circles -->
  <circle cx="700" cy="-50" r="200" fill="white" opacity="0.05"/>
  <circle cx="750" cy="420" r="150" fill="white" opacity="0.05"/>
  <circle cx="-50" cy="300" r="180" fill="white" opacity="0.04"/>
  <!-- Tag badge -->
  <rect x="40" y="40" width="100" height="28" rx="14" fill="white" opacity="0.2"/>
  <text x="90" y="59" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white">리뉴얼 비용</text>
  <!-- Main icon area -->
  <rect x="480" y="60" width="280" height="300" rx="20" fill="url(#card1)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Money/cost icon elements -->
  <text x="620" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="80" fill="white" opacity="0.9">💰</text>
  <text x="620" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.7">100만 ~ 1,200만 원</text>
  <text x="620" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.5">비용 차이의 비밀</text>
  <!-- Main text -->
  <text x="40" y="130" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" opacity="0.8">2026년 기준</text>
  <text x="40" y="175" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="white">홈페이지 리뉴얼</text>
  <text x="40" y="215" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="white">비용 총정리</text>
  <text x="40" y="265" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.75">견적 전에 꼭 읽어야 할 가이드</text>
  <!-- Bottom bar -->
  <rect x="40" y="310" width="60" height="4" rx="2" fill="white" opacity="0.6"/>
  <text x="40" y="345" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.6">비전솔루션</text>
</svg>
