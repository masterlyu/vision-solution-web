<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="200" fill="#ffffff"/>
  <text x="40" y="40" font-size="18" font-weight="800" fill="#1f2937">ChatGPT vs Odysseus — 연간 비용 비교</text>
  <!-- 카드 1: ChatGPT 구독료 -->
  <rect x="40" y="64" width="220" height="110" rx="12" fill="#fee2e2"/>
  <text x="150" y="120" text-anchor="middle" font-size="34" font-weight="900" fill="#dc2626">$240</text>
  <text x="150" y="150" text-anchor="middle" font-size="13" fill="#6b7280">ChatGPT Plus 연간(인당)</text>
  <!-- 카드 2: Odysseus 비용 -->
  <rect x="290" y="64" width="220" height="110" rx="12" fill="#d1fae5"/>
  <text x="400" y="120" text-anchor="middle" font-size="34" font-weight="900" fill="#059669">0원</text>
  <text x="400" y="150" text-anchor="middle" font-size="13" fill="#6b7280">Odysseus 연간 비용</text>
  <!-- 카드 3: GitHub 별 -->
  <rect x="540" y="64" width="220" height="110" rx="12" fill="#eff6ff"/>
  <text x="650" y="120" text-anchor="middle" font-size="34" font-weight="900" fill="#2563eb">69K+</text>
  <text x="650" y="150" text-anchor="middle" font-size="13" fill="#6b7280">GitHub 별 (공개 2주 만에)</text>
</svg>
