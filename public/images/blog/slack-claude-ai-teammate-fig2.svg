<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" font-family="Arial, 'Malgun Gothic', sans-serif">
  <rect width="800" height="300" fill="#ffffff"/>
  <text x="40" y="44" font-size="20" font-weight="800" fill="#1f2937">회의 스레드 정리: 전과 후</text>
  <!-- 전: 수동 정리 -->
  <rect x="160" y="80" width="120" height="160" rx="6" fill="#cbd5e1"/>
  <text x="220" y="65" text-anchor="middle" font-size="22" font-weight="800" fill="#6b7280">수동</text>
  <text x="220" y="112" text-anchor="middle" font-size="30" font-weight="900" fill="#6b7280">30분</text>
  <text x="220" y="140" text-anchor="middle" font-size="13" fill="#6b7280">스크롤 + 복붙</text>
  <text x="220" y="160" text-anchor="middle" font-size="13" fill="#6b7280">직접 작성</text>
  <text x="220" y="275" text-anchor="middle" font-size="15" fill="#1f2937">@클로드 없이</text>
  <!-- 화살표 + 변화 -->
  <text x="400" y="175" text-anchor="middle" font-size="16" font-weight="700" fill="#16a34a">시간 절약 ↓</text>
  <!-- 후: @클로드 태그 -->
  <rect x="520" y="220" width="120" height="20" rx="6" fill="#0f766e"/>
  <text x="580" y="205" text-anchor="middle" font-size="22" font-weight="800" fill="#0f766e">30초</text>
  <text x="580" y="255" text-anchor="middle" font-size="13" fill="#1f2937">@클로드 태그</text>
  <text x="580" y="275" text-anchor="middle" font-size="15" fill="#1f2937">자동 요약</text>
  <!-- 라벨 -->
  <text x="400" y="30" text-anchor="middle" font-size="13" fill="#6b7280">※ 실무 참고용 비교 예시입니다</text>
</svg>
