<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="700" cy="-50" r="200" fill="white" opacity="0.05"/>
  <circle cx="750" cy="420" r="150" fill="white" opacity="0.05"/>

  <!-- Top badge -->
  <rect x="40" y="40" width="180" height="28" rx="14" fill="white" opacity="0.2"/>
  <text x="130" y="59" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">Microsoft Build 2026</text>

  <!-- Right side cards -->
  <rect x="470" y="55" width="300" height="305" rx="20" fill="url(#card)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Card stats -->
  <text x="570" y="115" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle">파라미터</text>
  <text x="570" y="150" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">14B</text>
  <text x="570" y="172" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">Aion Plan 에이전트</text>

  <line x1="490" y1="195" x2="760" y2="195" stroke="white" stroke-opacity="0.15" stroke-width="1"/>

  <text x="570" y="225" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle">구독료</text>
  <text x="570" y="260" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">₩0</text>
  <text x="570" y="282" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">윈도우 기본 내장</text>

  <line x1="490" y1="305" x2="760" y2="305" stroke="white" stroke-opacity="0.15" stroke-width="1"/>

  <text x="570" y="335" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle">데이터 처리</text>
  <text x="570" y="360" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">100% 로컬</text>

  <!-- Left main text -->
  <text x="40" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="white" opacity="0.8">마이크로소프트 Aion 1.0</text>
  <text x="40" y="175" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="white">윈도우에 AI가</text>
  <text x="40" y="217" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="white">내장됐다</text>
  <text x="40" y="262" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.75">구독료 0원 · 외부 서버 없이 · 내 PC에서만</text>

  <!-- Divider -->
  <rect x="40" y="305" width="60" height="4" rx="2" fill="white" opacity="0.6"/>

  <!-- Company badge -->
  <text x="40" y="340" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.6">(주)비젼솔루션</text>

  <!-- Use cases -->
  <text x="40" y="380" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.75)">✓ 계약서 검토  ✓ 이메일 초안  ✓ 파일 자동 정리</text>
</svg>
