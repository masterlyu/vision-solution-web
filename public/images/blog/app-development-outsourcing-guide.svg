      <stop offset="0%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" />
  <circle cx="700" cy="-50" r="200" fill="white" opacity="0.05"/>
  <circle cx="750" cy="450" r="180" fill="white" opacity="0.04"/>
  <!-- Tag badge -->
