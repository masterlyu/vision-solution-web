name: Deploy Notify

on:
  push:
    branches: [main]

jobs:
  notify:
    name: Wait for Vercel and report honestly
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for Vercel deployment status
        id: vercel
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const maxTries = 30;
            const delay = 15000;

            for (let i = 0; i < maxTries; i++) {
              const deployments = await github.rest.repos.listDeployments({
                owner, repo, sha, per_page: 10,
              });
              const vercelDeploys = deployments.data.filter(d =>
                (d.creator && d.creator.login && d.creator.login.toLowerCase().includes('vercel'))
                || d.environment.toLowerCase().includes('production')
                || d.environment.toLowerCase().includes('preview')
              );

              for (const d of vercelDeploys) {
                const statuses = await github.rest.repos.listDeploymentStatuses({
                  owner, repo, deployment_id: d.id, per_page: 5,
                });
                const latest = statuses.data[0];
                if (!latest) continue;
                core.info(`Deployment ${d.id} (${d.environment}) state=${latest.state}`);
                if (['success', 'failure', 'error', 'inactive'].includes(latest.state)) {
                  core.setOutput('state', latest.state);
                  core.setOutput('env', d.environment);
                  core.setOutput('url', latest.target_url || latest.environment_url || '');
                  return;
                }
              }
              await new Promise(r => setTimeout(r, delay));
            }
            core.setOutput('state', 'timeout');
            core.setOutput('env', 'unknown');
            core.setOutput('url', '');

      - name: Telegram — success
        if: steps.vercel.outputs.state == 'success'
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ENVIRONMENT: ${{ steps.vercel.outputs.env }}
          DEPLOY_URL: ${{ steps.vercel.outputs.url }}
        run: |
          TEXT="✅ Vercel 배포 성공 (${ENVIRONMENT})
          ${COMMIT_MSG}
          🌐 https://www.visionc.co.kr
          🔗 ${DEPLOY_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${TEXT}"

      - name: Telegram — failure
        if: steps.vercel.outputs.state == 'failure' || steps.vercel.outputs.state == 'error'
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ENVIRONMENT: ${{ steps.vercel.outputs.env }}
          DEPLOY_URL: ${{ steps.vercel.outputs.url }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          TEXT="❌ Vercel 배포 실패 (${ENVIRONMENT})
          커밋: ${SHORT_SHA}
          ${COMMIT_MSG}
          🔗 로그: ${DEPLOY_URL}
          ⚠ 실사이트 미반영 — 즉시 확인 필요"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${TEXT}"
          exit 1

      - name: Telegram — timeout
        if: steps.vercel.outputs.state == 'timeout'
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          TEXT="⏱ Vercel 배포 상태 확인 타임아웃
          커밋: ${SHORT_SHA}
          7.5분 이내 상태 미결정 — Vercel 대시보드 직접 확인 필요"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${TEXT}"
